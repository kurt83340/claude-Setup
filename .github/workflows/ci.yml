name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Suite de tests des hooks
        run: python3 test/test_hooks.py

      - name: Suite de tests render.py (init-from-template)
        run: python3 test/test_render.py

      - name: Suite de tests cleanup-for-type.py (sentinelles + brownfield + prune)
        run: python3 test/test_cleanup.py

      - name: settings.json est un JSON valide
        run: python3 -m json.tool .claude/settings.json > /dev/null

      - name: CLAUDE.md = 3 @-imports (index just-in-time)
        run: |
          n=$(grep -oE '@\.claude/[^ ]+' CLAUDE.md | wc -l)
          echo "@-imports: $n"
          test "$n" -eq 3

      - name: Pas de 'npx specify' dans STRUCTURE.md
        run: |
          ! grep -q 'npx specify' STRUCTURE.md

      - name: Tous les hooks Python compilent
        run: python3 -m py_compile .claude/hooks/*.py

      - name: Inventaire skills synchro avec .claude/CLAUDE.md
        run: |
          rc=0
          for d in .claude/skills/*/; do
            name=$(basename "$d")
            grep -q "/$name" .claude/CLAUDE.md || { echo "❌ Skill '$name' absent de l'inventaire .claude/CLAUDE.md"; rc=1; }
          done
          declared=$(grep -oE '\*\*[0-9]+ skills cœur\*\*' .claude/CLAUDE.md | grep -oE '[0-9]+' | head -1)
          actual=$(ls -d .claude/skills/*/ | wc -l)
          if [ "$declared" != "$actual" ]; then echo "❌ Compte déclaré ($declared) ≠ dossiers skills ($actual)"; rc=1; fi
          if [ "$rc" -ne 0 ]; then exit 1; fi
          echo "✅ Skills recensés + compte déclaré ($declared) = réel ($actual)"

      - name: Pipelines feature — maillons existants
        run: |
          python3 - <<'PY'
          import re, sys
          from pathlib import Path
          core = {p.name for p in Path(".claude/skills").iterdir() if p.is_dir()}
          house = {f"{pl.parent.parent.name}:{pl.name}" for pl in Path("plugins").glob("*/skills/*") if pl.is_dir()}
          agents = {p.stem for p in Path(".claude/agents").glob("*.md")} | {p.stem for p in Path("plugins").glob("*/agents/*.md")}
          EXTERNES = {"n8n-mcp-skills"}
          BUILTINS = {"plugin", "resume", "compact", "clear", "doctor"}
          rc = 0
          for f in sorted(Path(".claude/skills/feature/pipelines").glob("*.md")):
              text = f.read_text(encoding="utf-8")
              for r in set(re.findall(r"`/([a-z0-9_:-]+)", text)):
                  base = r.split('"')[0]
                  ns = base.split(":")[0] if ":" in base else None
                  if not (base in core or base in house or ns in EXTERNES or base in BUILTINS):
                      print(f"❌ {f.name}: maillon inconnu /{base}"); rc = 1
              for a in re.findall(r"subagent `([a-z-]+)`", text):
                  if a not in agents:
                      print(f"❌ {f.name}: agent inconnu {a}"); rc = 1
          if rc: sys.exit(1)
          print("✅ pipelines : tous les maillons référencés existent")
          PY

      - name: Version template = tete du CHANGELOG
        run: |
          v_file=$(tr -d ' \n' < .claude/template-version)
          v_log=$(grep -m1 -oE '^## \[[0-9.]+\]' .github/CHANGELOG.md | tr -d '#[] ')
          echo "fichier=$v_file changelog=$v_log"
          test "$v_file" = "$v_log"

      - name: Defs teammate ont SendMessage dans tools
        run: |
          rc=0
          # doc-maintainer = subagent pur (jamais teammate) → exempté
          for f in .claude/agents/*.md plugins/*/agents/*.md; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .md)
            case "$name" in README|doc-maintainer) continue;; esac
            # pas de champ tools: → l'agent hérite de TOUT (dont SendMessage) : conforme
            grep -qE '^tools:' "$f" || continue
            grep -qE '^tools:.*\bSendMessage\b' "$f" || { echo "❌ Agent '$name' : tools: restreint SANS SendMessage (teammate muet garanti)"; rc=1; }
          done
          if [ "$rc" -ne 0 ]; then exit 1; fi
          echo "✅ Tous les rôles teammate ont SendMessage dans tools:"

      - name: Manifestes marketplace + plugins coherents
        run: |
          python3 - <<'PY'
          import json, sys
          from pathlib import Path
          rc = 0
          mp = json.load(open(".claude-plugin/marketplace.json"))
          listed = {}
          for p in mp.get("plugins", []):
              name, src = p.get("name", "?"), p.get("source")
              if not isinstance(src, str) or not Path(src).is_dir():
                  print(f"❌ marketplace: source introuvable pour '{name}' : {src}"); rc = 1; continue
              pj = Path(src) / ".claude-plugin" / "plugin.json"
              if not pj.is_file():
                  print(f"❌ {src}: plugin.json manquant"); rc = 1; continue
              if json.load(open(pj)).get("name") != name:
                  print(f"❌ {src}: plugin.json name ≠ marketplace name '{name}'"); rc = 1
              listed[Path(src).resolve()] = name
          plugroot = Path("plugins")
          for d in (sorted(plugroot.iterdir()) if plugroot.is_dir() else []):
              if d.is_dir() and d.resolve() not in listed:
                  print(f"❌ {d}/ absent du marketplace.json"); rc = 1
          if rc: sys.exit(1)
          print(f"✅ marketplace ({len(listed)} plugins) : JSON valides, sources presentes, plugins/ tous recenses")
          PY

      - name: EXAMPLES/acme — _CLAUDE.md respecte la règle des 3 @-imports
        run: |
          n=$(grep -oE '@\.claude/[^ ]+' EXAMPLES/acme-sync-erp-notion-docs/_CLAUDE.md | wc -l)
          echo "@-imports acme: $n"
          test "$n" -eq 3
